<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sessions List View</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007aff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex justify-center min-h-screen pb-24">
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 min-h-screen shadow-sm overflow-x-hidden flex flex-col">
<!-- Header -->
<div class="flex items-center justify-between p-4 pb-2">
<h1 class="text-3xl font-bold tracking-tight">Sessions</h1>
<button class="text-primary flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">swap_vert</span>
</button>
</div>
<!-- Search Bar -->
<div class="px-4 py-3">
<div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg px-3 py-2 border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-400">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-base placeholder-slate-400 dark:placeholder-slate-500 py-1 px-2 text-slate-900 dark:text-slate-100" placeholder="Search sessions" type="text"/>
</div>
</div>
<!-- Section: Today -->
<div class="px-4 py-2 mt-2">
<h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Today</h2>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden flex flex-col mb-4">
<div class="flex items-center gap-4 px-4 py-3 justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-green-500 text-[28px]">check_circle</span>
<div class="flex flex-col">
<p class="font-semibold text-lg line-clamp-1">Project Alpha Meeting</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">10:30 AM</p>
</div>
</div>
<p class="text-slate-500 dark:text-slate-400">5:30</p>
</div>
<div class="px-4 pb-3">
<div class="w-full h-[2px] bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-green-500 w-full rounded-full"></div>
</div>
</div>
</div>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden flex flex-col mb-4">
<div class="flex items-center gap-4 px-4 py-3 justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-red-500 text-[28px] animate-pulse">radio_button_checked</span>
<div class="flex flex-col">
<p class="font-semibold text-lg line-clamp-1">Client Interview</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">2:00 PM</p>
</div>
</div>
<p class="text-red-500 font-medium">12:45</p>
</div>
<div class="px-4 pb-3">
<div class="w-full h-[2px] bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[45%] rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Section: Yesterday -->
<div class="px-4 py-2 mt-2">
<h2 class="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Yesterday</h2>
<div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden flex flex-col mb-4">
<div class="flex items-center gap-4 px-4 py-3 justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-green-500 text-[28px]">check_circle</span>
<div class="flex flex-col">
<p class="font-semibold text-lg line-clamp-1">Weekly Standup</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">9:00 AM</p>
</div>
</div>
<p class="text-slate-500 dark:text-slate-400">15:20</p>
</div>
<div class="px-4 pb-3">
<div class="w-full h-[2px] bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-green-500 w-full rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Floating Action Button -->
<div class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50">
<button class="bg-primary text-white w-14 h-14 rounded-full flex items-center justify-center hover:bg-primary/90 transition-transform active:scale-95 shadow-sm border border-primary/20">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
</div>
</body></html>
